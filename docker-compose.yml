version: '3.9'

services:
  api:
    build:
      context: ./api
    ports:
      - '8000:8000'
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - DATA_DIR=/app/data
      - MODEL_NAME=groq/llama-3.1-8b-instant
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  ui:
    build:
      context: ./ui
    ports:
      - '8501:8501'
    environment:
      - VITE_API_URL=http://api:8000
    depends_on:
      - api
    command: npm run dev -- --host 0.0.0.0 --port 8501